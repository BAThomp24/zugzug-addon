name: Update build data & release

# Three triggers, all routed through one job:
#
#   * schedule (cron) — daily Data.lua refresh. Releases only if Data.lua
#     actually changed (skipping the release tag on data-stable days).
#   * push to main   — code-only changes ship the same day, no waiting
#     for the next cron. Matches zugzug-keys' release flow.
#   * workflow_dispatch — manual trigger, mirrors the cron behaviour
#     (runs the data update + releases if anything changed).
on:
  schedule:
    # Daily at 16:00 UTC (noon EDT) — well after the WCL cron pipeline finishes
    - cron: "0 16 * * *"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - ".github/**"
      - "scripts/**"
      - "LEVELING_DESIGN.md"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Node is only needed for the data-update path. Skip it on
      # push runs so they ship in ~10s instead of ~60s.
      - uses: actions/setup-node@v4
        if: github.event_name != 'push'
        with:
          node-version: 22

      - name: Fetch API and regenerate Data.lua
        if: github.event_name != 'push'
        run: npx tsx scripts/update-data.ts

      - name: Compute version tag
        id: version
        # CurseForge only re-syncs on a *new* release tag; updating the
        # asset on an existing tag is silently ignored. The daily cron
        # owns the clean v<date> tag (it runs once/day, no self-collision).
        # Push / manual runs append HHMM so they're always a fresh tag —
        # otherwise a push the same day after the cron would update the
        # asset but never reach CurseForge (which is exactly what stranded
        # the 12.0.7 bump on the 120005 build).
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "tag=v$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(date -u +%Y.%m.%d.%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: Did Data.lua actually change?
        id: diff
        if: github.event_name != 'push'
        run: |
          if git diff --quiet Data.lua; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit Data.lua update
        if: github.event_name != 'push' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data.lua
          git commit -m "data: update builds ${{ steps.version.outputs.tag }}"
          git push

      # Release on every code push and every workflow_dispatch, and on
      # cron runs ONLY when Data.lua changed (we don't want to tag the
      # repo if nothing meaningful happened).
      - name: Should we release?
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.diff.outputs.changed }}" != "true" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Cron with unchanged Data.lua — skipping release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      # File list mirrors the TOC's load order. Anything the TOC pulls
      # in must be here or the released addon will fail to load.
      # Substitute @project-version@ with the real tag first so the
      # in-game Version field is meaningful (our custom pipeline doesn't
      # run the CurseForge packager that normally does this). The checkout
      # is disposable, so editing the TOC in place is fine.
      - name: Build ZugZug.zip
        if: steps.gate.outputs.release == 'true'
        run: |
          sed -i "s/@project-version@/${{ steps.version.outputs.tag }}/" ZugZug.toc
          zip -r ZugZug.zip \
            ZugZug.toc \
            Data.lua \
            LevelingData.lua \
            Core.lua \
            Settings.lua \
            UI.lua \
            Suggest.lua \
            Leveling.lua \
            icon.png

      # softprops/action-gh-release updates the release in place if the
      # tag already exists (multiple pushes per day → one release).
      - name: Create or update GitHub Release
        if: steps.gate.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZugZug ${{ steps.version.outputs.tag }}
          body: |
            Talent build data + ZugZug.io companion addon.

            Download `ZugZug.zip` and extract into your
            `Interface/AddOns/` folder, or install via CurseForge/WoWUp.
          files: ZugZug.zip
