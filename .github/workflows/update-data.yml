name: Update build data & release

# Three triggers, all routed through one job:
#
#   * schedule (cron) — daily DataRIO.lua refresh. Releases only if the
#     data actually changed (skipping the release tag on stable days).
#   * push to main   — code-only changes ship the same day, no waiting
#     for the next cron. Matches zugzug-keys' release flow.
#   * workflow_dispatch — manual trigger, mirrors the cron behaviour
#     (runs the data update + releases if anything changed).
#
# The old Data.lua path (zugzug.info worker /api/data, WCL pipeline) was
# retired when the website was decommissioned — Raider.IO is the sole
# data source.
on:
  schedule:
    # Daily at 16:00 UTC (noon EDT)
    - cron: "0 16 * * *"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - ".github/**"
      - "scripts/**"
      - "LEVELING_DESIGN.md"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Node is only needed for the data-update path. Skip it on
      # push runs so they ship in ~10s instead of ~60s.
      - uses: actions/setup-node@v4
        if: github.event_name != 'push'
        with:
          node-version: 22

      # Raider.IO dataset (the addon's sole data source). Slow (~40 min:
      # paced internal-API pulls + lazily-materialized bracket/dungeon
      # snapshots) and non-fatal: if RIO changes shape or throttles, the
      # previous committed DataRIO.lua keeps shipping and today's release
      # is simply skipped.
      - name: Regenerate DataRIO.lua (Raider.IO)
        if: github.event_name != 'push'
        continue-on-error: true
        timeout-minutes: 75
        run: npx tsx scripts/update-data-rio.ts

      - name: Compute version tag
        id: version
        # CurseForge only re-syncs on a *new* release tag; updating the
        # asset on an existing tag is silently ignored. The daily cron
        # owns the clean v<date> tag (it runs once/day, no self-collision).
        # Push / manual runs append HHMM so they're always a fresh tag —
        # otherwise a push the same day after the cron would update the
        # asset but never reach CurseForge (which is exactly what stranded
        # the 12.0.7 bump on the 120005 build).
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "tag=v$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(date -u +%Y.%m.%d.%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: Did the data actually change?
        id: diff
        if: github.event_name != 'push'
        run: |
          if git diff --quiet DataRIO.lua; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit data update
        if: github.event_name != 'push' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DataRIO.lua
          git commit -m "data: update builds ${{ steps.version.outputs.tag }}"
          git push

      # Release on every code push and every workflow_dispatch, and on
      # cron runs ONLY when Data.lua changed (we don't want to tag the
      # repo if nothing meaningful happened).
      - name: Should we release?
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.diff.outputs.changed }}" != "true" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Cron with unchanged DataRIO.lua — skipping release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      # File list mirrors the TOC's load order. Anything the TOC pulls
      # in must be here or the released addon will fail to load.
      # Substitute @project-version@ with the real tag first so the
      # in-game Version field is meaningful (our custom pipeline doesn't
      # run the CurseForge packager that normally does this). The checkout
      # is disposable, so editing the TOC in place is fine.
      - name: Build ZugZug.zip
        if: steps.gate.outputs.release == 'true'
        # Stage into a ZugZug/ folder first — the zip must contain the addon
        # FOLDER, not loose files, or "extract into Interface/AddOns/" (per
        # the release body) produces a broken install. Staged under stage/
        # because the repo root already has a ZugZug/ dir with editor files.
        run: |
          sed -i "s/@project-version@/${{ steps.version.outputs.tag }}/" ZugZug.toc
          mkdir -p stage/ZugZug
          cp ZugZug.toc \
             DataRIO.lua \
             LevelingData.lua \
             Core.lua \
             Settings.lua \
             UI.lua \
             Suggest.lua \
             Leveling.lua \
             icon.png \
             stage/ZugZug/
          (cd stage && zip -r ../ZugZug.zip ZugZug)

      # softprops/action-gh-release updates the release in place if the
      # tag already exists (multiple pushes per day → one release).
      - name: Create or update GitHub Release
        if: steps.gate.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZugZug ${{ steps.version.outputs.tag }}
          body: |
            Top raid & M+ talent builds (Raider.IO) with one-click import.

            Download `ZugZug.zip` and extract into your
            `Interface/AddOns/` folder, or install via CurseForge/WoWUp.
          files: ZugZug.zip
